name: Build F1 Recorder (Windows exe)

on:
  # Trigger on version tags: git tag v1.0.0 && git push --tags
  push:
    tags:
      - "v*"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Only recorder deps — no discord.py / matplotlib needed for the exe
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller build/recorder.spec --distpath dist --workpath build/work --clean

      - name: Verify exe exists
        run: |
          if (!(Test-Path "dist/F1_Recorder.exe")) {
            Write-Error "Build failed: dist/F1_Recorder.exe not found"
            exit 1
          }
          $size = (Get-Item "dist/F1_Recorder.exe").length / 1MB
          Write-Host ("exe size: {0:N1} MB" -f $size)

      - name: Upload artifact (always available for download)
        uses: actions/upload-artifact@v4
        with:
          name: F1_Recorder_Windows
          path: dist/F1_Recorder.exe
          retention-days: 30

      - name: Create GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/F1_Recorder.exe
          generate_release_notes: true
          body: |
            ## F1 25 Telemetry Recorder — ${{ github.ref_name }}

            ### Download
            Download `F1_Recorder.exe` and double-click to run — no installation required.

            ### How to use
            1. Double-click `F1_Recorder.exe`
            2. Follow the on-screen instructions to enable UDP Telemetry in F1 25
            3. Press `Ctrl+C` after the race to stop recording
            4. Upload the generated `race.zip` to the Discord channel

            ### Transparency
            This exe is automatically built by GitHub Actions from the source code in this repository.
            The build process is fully public: [View Actions logs](${{ github.server_url }}/${{ github.repository }}/actions)
