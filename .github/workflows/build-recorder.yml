name: Build F1 Recorder (Windows exe)

on:
  # Trigger on version tags: git tag v1.0.0 && git push --tags
  push:
    tags:
      - "v*"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Only recorder deps — no discord.py / matplotlib needed for the exe
          pip install pyinstaller

      - name: Build exe
        run: pyinstaller build/recorder.spec --distpath dist --workpath build/work --clean

      - name: Verify exe exists
        run: |
          if (!(Test-Path "dist/F1_Recorder.exe")) {
            Write-Error "Build failed: dist/F1_Recorder.exe not found"
            exit 1
          }
          $size = (Get-Item "dist/F1_Recorder.exe").length / 1MB
          Write-Host ("exe size: {0:N1} MB" -f $size)

      - name: Upload artifact (always available for download)
        uses: actions/upload-artifact@v4
        with:
          name: F1_Recorder_Windows
          path: dist/F1_Recorder.exe
          retention-days: 30

      - name: Create GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/F1_Recorder.exe
          generate_release_notes: true
          body: |
            ## F1 25 Telemetry Recorder — ${{ github.ref_name }}

            ### 下载
            下载 `F1_Recorder.exe`，双击运行即可，无需安装任何软件。

            ### 使用方法
            1. 双击 `F1_Recorder.exe`
            2. 按照屏幕提示在 F1 25 游戏内开启 UDP Telemetry
            3. 比赛结束后按 `Ctrl+C` 停止录制
            4. 将生成的 `race.zip` 上传到 Discord 频道

            ### 可信度说明
            本 exe 由 GitHub Actions 自动从源码构建，
            构建过程完全公开：[查看 Actions 日志](${{ github.server_url }}/${{ github.repository }}/actions)
